name: publish

on:
  push:
    tags: ['*/v*']

jobs:
  publish:
    permissions:
      contents: read
      id-token: write
    uses: hop-top/.github/.github/workflows/publish-on-tag.yml@v0
    # TODO(secrets): verify the following org-level secrets exist before
    # enabling this workflow on a tag push. Until then, the reusable
    # workflow will fail on its first run.
    secrets:
      NPM_REGISTRY_TOKEN:   ${{ secrets.NPM_REGISTRY_TOKEN }}
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      PYPI_REGISTRY_TOKEN:  ${{ secrets.PYPI_REGISTRY_TOKEN }}
      GH_MIRROR_PAT:        ${{ secrets.GH_MIRROR_PAT }}
    with:
      homepage: https://github.com/hop-top/c12n
      description-prefix: "READ-ONLY MIRROR"
      ecosystems: |
        c12n:
          dir: .
          ecosystem: go
          mirror: hop-top/c12n
