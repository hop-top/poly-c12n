name: publish

on:
  push:
    tags: ['*/v*']

jobs:
  publish:
    permissions:
      contents: read
      id-token: write
    uses: hop-top/.github/.github/workflows/publish-on-tag.yml@v0
    # TODO(secrets): verify the following org-level secrets exist before
    # enabling this workflow on a tag push. Until then, the reusable
    # workflow will fail on its first run.
    secrets:
      NPM_REGISTRY_TOKEN:   ${{ secrets.NPM_REGISTRY_TOKEN }}
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      PYPI_REGISTRY_TOKEN:  ${{ secrets.PYPI_REGISTRY_TOKEN }}
      GH_MIRROR_PAT:        ${{ secrets.GH_MIRROR_PAT }}
    with:
      homepage: https://github.com/hop-top/poly-c12n
      description-prefix: "READ-ONLY MIRROR"
      ecosystems: |
        c12n:
          dir: go
          ecosystem: go
          mirror: hop-top/c12n
        c12n-core:
          dir: core
          ecosystem: rs
          package: hop-top-c12n-core
          mirror: hop-top/c12n-core
          rust-toolchain: stable
        c12n-rs:
          dir: rs
          ecosystem: rs
          package: hop-top-c12n
          mirror: hop-top/c12n-rs
          rust-toolchain: stable
        c12n-py:
          dir: py
          ecosystem: py
          package: hop-top-c12n
          mirror: hop-top/c12n-py
          python-version: '3.11'
          test-command: pip install pytest && PYTHONPATH=python pytest -q
          pypi-auth: token
        c12n-ts:
          dir: ts
          ecosystem: ts
          package: "@hop-top/c12n"
          mirror: hop-top/c12n-ts
          node-version: '22'
        c12n-php:
          dir: php
          ecosystem: php
          package: hop-top/c12n
          mirror: hop-top/c12n-php

  goreleaser:
    # Fires only on the bare Go CLI tag (e.g. c12n/v0.1.0-alpha.0).
    # Library tags such as c12n-ts/v*, c12n-py/v*, c12n-rs/v*,
    # c12n-php/v*, c12n-core/v* are excluded.
    if: startsWith(github.ref_name, 'c12n/v') && !startsWith(github.ref_name, 'c12n-')
    permissions:
      contents: write
    uses: hop-top/.github/.github/workflows/goreleaser-on-tag.yml@v0
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}
    with:
      homebrew-tap-repo: homebrew-tap
      scoop-bucket-repo: scoop-bucket
