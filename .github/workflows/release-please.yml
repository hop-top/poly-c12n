name: release-please

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Mint a short-lived installation token from the hop-top release-bot
      # GitHub App so release PRs are opened by `release-bot[bot]` rather
      # than the human owner — sidesteps any CODEOWNERS self-approval block
      # on `.release-please-manifest.json`.
      #
      # TODO(secrets): requires `RELEASE_BOT_APP_ID` + `RELEASE_BOT_PRIVATE_KEY`
      # repo secrets to be provisioned by an org admin before this job will
      # mint a token. Until then, release-please runs will fail at the
      # app-token step.
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
          token: ${{ steps.app-token.outputs.token }}
